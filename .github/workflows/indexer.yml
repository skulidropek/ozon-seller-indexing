name: Ozon Seller Indexer

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "Duration to run indexer"
        required: false
        default: "9"
        type: string
      max_pages_per_run:
        description: "Maximum category pages per run"
        required: false
        default: "25"
        type: string
      max_products_per_run:
        description: "Maximum products per run"
        required: false
        default: "300"
        type: string
      max_sellers_per_run:
        description: "Maximum sellers per run"
        required: false
        default: "150"
        type: string
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: ozon-seller-indexer
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Configure Git
        run: |
          git config --global user.name "Ozon Seller Indexer Bot"
          git config --global user.email "indexer@github-actions.local"

      - name: Ensure output directories
        run: mkdir -p data state reports/runs

      - name: Build
        run: npm run build

      - name: Run indexer
        env:
          DATA_DIRECTORY: data
          STATE_FILE: state/indexer-state.json
          REPORTS_DIRECTORY: reports
          MAX_CATEGORY_WORKERS: "1"
          MAX_PRODUCT_WORKERS: "2"
          MAX_SELLER_WORKERS: "2"
          MAX_PAGES_PER_RUN: ${{ github.event.inputs.max_pages_per_run || '25' }}
          MAX_PRODUCTS_PER_RUN: ${{ github.event.inputs.max_products_per_run || '300' }}
          MAX_SELLERS_PER_RUN: ${{ github.event.inputs.max_sellers_per_run || '150' }}
          MIN_ACTION_DELAY_MS: "2000"
          MAX_ACTION_DELAY_MS: "6000"
          BLOCK_COOLDOWN_MS: "180000"
          HEADLESS: "true"
        run: |
          DURATION="${{ github.event.inputs.duration_minutes || '9' }}"
          timeout $((DURATION * 60 + 30)) node dist/index.js timed --duration-minutes "$DURATION" \
            || echo "Indexer stopped by timeout or graceful block; committing saved progress if present."

      - name: Stage changes
        id: changes
        run: |
          git add data state reports
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
          fi

      - name: Commit and push JSON data
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="${GITHUB_REF_NAME:-$(git branch --show-current)}"
          SELLERS=$(find data/sellers -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          PRODUCTS=$(find data/products -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          PAGES=$(find data/category-pages -name '*.json' 2>/dev/null | wc -l | tr -d ' ')
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          git commit -m "Automated Ozon seller indexing: ${TIMESTAMP}" \
            -m "Stats:" \
            -m "- Seller files: ${SELLERS}" \
            -m "- Product files: ${PRODUCTS}" \
            -m "- Category page files: ${PAGES}" \
            -m "Generated by GitHub Actions workflow"
          git pull --rebase --autostash origin "$BRANCH"
          git push --force-with-lease origin "HEAD:${BRANCH}"

      - name: Dispatch next run when work remains
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f reports/latest-run.json ]; then
            echo "No latest report, skipping redispatch"
            exit 0
          fi
          SHOULD_CONTINUE=$(node -e "const r=require('./reports/latest-run.json'); console.log(r.shouldContinue ? 'true' : 'false')")
          if [ "$SHOULD_CONTINUE" != "true" ]; then
            echo "No remaining work"
            exit 0
          fi
          echo "Remaining work detected; dispatching next run"
          gh workflow run indexer.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f duration_minutes="${{ github.event.inputs.duration_minutes || '9' }}" \
            -f max_pages_per_run="${{ github.event.inputs.max_pages_per_run || '25' }}" \
            -f max_products_per_run="${{ github.event.inputs.max_products_per_run || '300' }}" \
            -f max_sellers_per_run="${{ github.event.inputs.max_sellers_per_run || '150' }}"

      - name: Summary
        if: always()
        run: |
          echo "Ozon Seller Indexing Summary"
          echo "- Seller files: $(find data/sellers -name '*.json' 2>/dev/null | wc -l || echo 0)"
          echo "- Product files: $(find data/products -name '*.json' 2>/dev/null | wc -l || echo 0)"
          echo "- Category page files: $(find data/category-pages -name '*.json' 2>/dev/null | wc -l || echo 0)"
          [ -f reports/latest-run.json ] && cat reports/latest-run.json
